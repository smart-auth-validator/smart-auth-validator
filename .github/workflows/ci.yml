name: CI - Test on Renovate Merge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Run build
        run: npm run build

      - name: Run Snyk Security Check
        run: npx snyk test --dev
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
