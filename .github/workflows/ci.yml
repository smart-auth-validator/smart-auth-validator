name: CI - Test on Renovate Merge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # ← Changed from read to write
      pull-requests: write   # ← Added for automerge
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci            # ← Use ci instead of install (faster + lockfile strict)

      - name: Run build
        run: npm run build

      - name: Run Snyk Security Check
        run: npx snyk test --dev || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
